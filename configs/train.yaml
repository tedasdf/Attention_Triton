# config.yaml
hyperparameters:
  block_size: 64
  batch_size: 256
  n_layer: 6
  n_head: 16
  d_model: 128
  d_compression: 128
  dropout: 0.5
  nb_features: 256
  lr: 0.012          # Scientific notation (6e-3) is also supported
  weight_decay: 0.05
  evals_per_epoch: 3
  attn_type: "sliding"
  epochs: 7
  seed: 1337
  log_file: "./logs/mainrun.log"
  data_dir: "./artifacts/datasets/hn_v1"
  output_dir: "./artifacts/runs/train"


checkpointing:
  save_latest: true
  save_best: true
  save_step_checkpoints: true
  step_checkpoint_interval: 100