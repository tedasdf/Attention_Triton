dataset:
  source_type: huggingface
  dataset_name: julien040/hacker-news-posts
  dataset_split: train
  text_field: title
  output_dir: artifacts/datasets/hn_250k
  num_samples: 23000
  seed: 1337
  val_frac: 0.1

tokenizer:
  vocab_size: 16000
  eos_token: "<eos>"
  reuse_existing: true
  vocab_filename: vocab.json
